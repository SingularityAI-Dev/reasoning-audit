<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Reasoning Audit. Find why your AI agent fails. 48 hours, $49.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#2a2a4a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#d97757" stroke-width="1.5" opacity="0.25" filter="url(#glow)">
    <animate attributeName="y1" values="-20;380;-20" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="-20;380;-20" dur="8s" repeatCount="indefinite"/>
  </line>
  <g transform="translate(160, 180)">
    <path d="M -55 -65 L -75 -65 L -75 65 L -55 65" fill="none" stroke="#d97757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 55 -65 L 75 -65 L 75 65 L 55 65" fill="none" stroke="#d97757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g>
      <circle cx="-25" cy="0" r="6" fill="#9d0208" filter="url(#glow)">
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="6" fill="#9d0208" filter="url(#glow)">
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="6s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="25" cy="0" r="6" fill="#9d0208" filter="url(#glow)">
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="6s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <path d="M -28 5 L -8 25 L 28 -15" fill="none" stroke="#52b788" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0" filter="url(#glow)">
        <animate attributeName="opacity" values="0;0;0;1;1;0;0" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="0" y="100" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#6b6b75" text-anchor="middle" letter-spacing="2">AGENT</text>
  </g>
  <text x="600" y="160" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="78" font-weight="800" fill="#fafaf7" text-anchor="middle" letter-spacing="-3">Reasoning Audit</text>
  <text x="600" y="208" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#b0b0c0" text-anchor="middle">Find why your AI agent fails. <tspan fill="#d97757" font-weight="700">48 hours, $49.</tspan></text>
  <line x1="430" y1="240" x2="770" y2="240" stroke="#2a2a4a" stroke-width="1"/>
  <text x="600" y="270" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#6b6b75" text-anchor="middle" letter-spacing="3">GOOGLE MEET · 2-PAGE REPORT · LOGIC.MD CONTRACT STUB</text>
  <g transform="translate(600, 308)">
    <rect x="-160" y="-18" width="320" height="36" rx="18" fill="#1a1a2e" stroke="#d97757" stroke-width="1.5"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#d97757" text-anchor="middle" letter-spacing="0.5">REFUND IF NO FIX LANDS IN 14 DAYS</text>
  </g>
  <g transform="translate(1040, 180)">
    <rect x="-50" y="-65" width="100" height="130" rx="10" fill="#1a1a2e" stroke="#2d6a4f" stroke-width="2"/>
    <line x1="-30" y1="-40" x2="30" y2="-40" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="-25" x2="20" y2="-25" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="-10" x2="25" y2="-10" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="5" x2="15" y2="5" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="20" x2="28" y2="20" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-30" y1="35" x2="22" y2="35" stroke="#52b788" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="32" cy="-55" r="9" fill="#2d6a4f"/>
    <path d="M 28 -55 L 31 -52 L 36 -58" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="83" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#6b6b75" text-anchor="middle" letter-spacing="2">REPORT</text>
  </g>
</svg>
